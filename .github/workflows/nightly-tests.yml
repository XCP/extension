name: Nightly Tests

permissions:
  contents: read
  issues: write  # For creating failure notification issues

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Hard backstop so a stalled setup can't burn the 6h job cap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build extension
        run: npm run build
      
      - name: Run TypeScript type checking
        run: npm run compile
        continue-on-error: true
      
      - name: Run unit tests
        timeout-minutes: 15
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: npx vitest run src

      - name: Run fuzz tests
        timeout-minutes: 15
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: npx vitest run src --config vitest.fuzz.config.ts
      
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 16
        run: |
          # The browser download can stall on the CDN; cap each attempt and retry
          # so a stall fails in minutes instead of hanging to the job timeout.
          for attempt in 1 2 3; do
            echo "Installing Playwright Chromium (attempt $attempt)..."
            if timeout 300 npx playwright install chromium; then
              exit 0
            fi
            echo "Attempt $attempt stalled or failed; retrying."
            sleep 5
          done
          echo "Playwright browser install failed after 3 attempts" >&2
          exit 1

      - name: Install Playwright system dependencies
        timeout-minutes: 5
        run: npx playwright install-deps chromium
      
      - name: Run all E2E tests
        timeout-minutes: 60
        run: npx playwright test --retries=3 --workers=1
        continue-on-error: true
      
      - name: Generate test report
        if: always()
        run: |
          echo "# Nightly Test Report" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "test-results.json" ]; then
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat test-results.json | jq '.stats' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: `Nightly tests failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly test run failed. Please check the [workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}) for details.`,
              labels: ['automated', 'test-failure']
            });
